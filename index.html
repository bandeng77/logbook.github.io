<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Buku Tamu - Genetek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4a6cf7;
      --primary-light: #6a8af8;
      --secondary-color: #6a5acd;
      --accent-color: #7FFFD4;
      --text-color: #333;
      --light-text-color: #666;
      --border-color: rgba(0,0,0,0.1);
      --bg-light: rgba(255,255,255,0.95);
      --shadow-light: 0 8px 32px rgba(31, 38, 135, 0.15);
      --shadow-hover: 0 12px 40px rgba(31, 38, 135, 0.25);
      --success-color: #28a745;
      --error-color: #dc3545;
      --warning-color: #ffc107;
      --info-color: #17a2b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--accent-color) 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-color);
    }

    .container {
      display: flex;
      flex-direction: row;
      gap: 40px;
      background: var(--bg-light);
      padding: 40px;
      border-radius: 20px;
      box-shadow: var(--shadow-light);
      max-width: 1100px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
    }

    .container:hover {
      box-shadow: var(--shadow-hover);
    }

    .form-wrapper, .camera-wrapper {
      flex: 1;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .camera-wrapper {
      text-align: center;
      padding-left: 20px;
      border-left: 1px solid var(--border-color);
    }

    img.logo {
      display: block;
      margin: 0 auto 25px;
      max-width: 200px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
      transition: transform 0.3s ease;
    }

    img.logo:hover {
      transform: scale(1.05);
    }

    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 28px;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h2 i {
      color: var(--secondary-color);
    }

    .form-group {
      position: relative;
      margin-bottom: 20px;
    }

    input, textarea, select {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background-color: rgba(255,255,255,0.7);
      transition: all 0.3s ease;
      color: var(--text-color);
      font-family: 'Poppins', sans-serif;
    }

    input::placeholder, textarea::placeholder, select option[disabled] {
      color: var(--light-text-color);
      opacity: 0.8;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.2);
      background-color: white;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 20px;
    }

    .form-group label {
      position: absolute;
      top: -10px;
      left: 15px;
      background: var(--bg-light);
      padding: 0 5px;
      font-size: 12px;
      color: var(--primary-color);
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .form-group.focused label {
      opacity: 1;
    }

    .error-message {
      color: var(--error-color);
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .form-group.error input,
    .form-group.error textarea,
    .form-group.error select {
      border-color: var(--error-color);
    }

    .form-group.error .error-message {
      display: block;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    button:active {
      transform: translateY(-1px);
    }

    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .camera-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .camera-controls button {
      flex: 1;
    }

    video {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      margin: 15px auto;
      display: block;
      transform: scaleX(-1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      background: #f0f0f0;
    }

    #preview {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      margin: 15px auto;
      display: none;
      object-fit: cover;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    canvas {
      display: none;
    }

    .photo-status {
      margin: 10px 0;
      font-size: 14px;
      color: var(--light-text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .photo-status.has-photo {
      color: var(--success-color);
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      color: white;
      font-weight: 500;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transform: translateX(150%);
      transition: transform 0.4s ease;
      z-index: 1000;
      max-width: 350px;
    }

    .notification.show {
      transform: translateX(0);
    }

    .notification.success {
      background-color: var(--success-color);
    }

    .notification.error {
      background-color: var(--error-color);
    }

    .notification.warning {
      background-color: var(--warning-color);
      color: #333;
    }

    .notification.info {
      background-color: var(--info-color);
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .connection-status {
      text-align: center;
      padding: 8px;
      margin-bottom: 15px;
      border-radius: 8px;
      font-size: 12px;
      background: #f8f9fa;
      color: #666;
    }

    .connection-status.connected {
      background: #d4edda;
      color: #155724;
    }

    .connection-status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }

    @media (max-width: 992px) {
      .container {
        flex-direction: column;
        gap: 30px;
        padding: 30px;
        max-width: 600px;
      }

      .camera-wrapper {
        border-left: none;
        padding-left: 0;
        padding-top: 30px;
        border-top: 1px solid var(--border-color);
      }

      img.logo {
        max-width: 180px;
      }

      h2 {
        font-size: 24px;
        margin-bottom: 25px;
      }

      input, textarea, select, button {
        padding: 12px;
        margin-bottom: 15px;
        font-size: 15px;
      }

      video, #preview {
        max-height: 300px;
      }
    }

    @media (max-width: 576px) {
      body {
        padding: 15px;
      }

      .container {
        padding: 25px;
        border-radius: 15px;
      }

      img.logo {
        max-width: 150px;
        margin-bottom: 20px;
      }

      h2 {
        font-size: 22px;
        margin-bottom: 20px;
      }

      input, textarea, select, button {
        padding: 10px;
        font-size: 14px;
        border-radius: 8px;
      }

      video, #preview {
        max-height: 240px;
        margin: 10px auto;
      }

      .camera-controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <img src="genetek-logo.png" alt="Genetek Logo" class="logo" onerror="this.src='https://via.placeholder.com/200x80?text=Genetek'" />
      <h2><i class="fas fa-book"></i> Buku Tamu</h2>
      
      <div class="connection-status" id="connectionStatus">
        <i class="fas fa-spinner fa-pulse"></i> Mengecek koneksi...
      </div>
      
      <form id="logForm">
        <div class="form-group">
          <input type="text" id="tanggal" required readonly style="pointer-events: none; background-color: rgba(245,245,245,0.7);" />
          <label for="tanggal">Tanggal & Waktu</label>
        </div>
        <div class="form-group">
          <input type="text" id="nama" placeholder="Nama Lengkap" required />
          <label for="nama">Nama Lengkap</label>
          <div class="error-message">Nama lengkap harus diisi</div>
        </div>
        <div class="form-group">
          <input type="text" id="perusahaan" placeholder="Nama Perusahaan" required />
          <label for="perusahaan">Nama Perusahaan</label>
          <div class="error-message">Nama perusahaan harus diisi</div>
        </div>
        <div class="form-group">
          <input type="text" id="alamat" placeholder="Alamat Perusahaan" required />
          <label for="alamat">Alamat Perusahaan</label>
          <div class="error-message">Alamat perusahaan harus diisi</div>
        </div>
        <div class="form-group">
          <input type="tel" id="telepon" placeholder="Nomor Telepon (cth: 081234567890)" required />
          <label for="telepon">Nomor Telepon</label>
          <div class="error-message">Format nomor telepon tidak valid</div>
        </div>
        <div class="form-group">
          <select id="tujuan" required>
            <option value="" disabled selected>Pilih Tujuan Kunjungan</option>
            <option value="Antar Dokumen">Antar Dokumen</option>
            <option value="Ambil Dokumen">Ambil Dokumen</option>
            <option value="Antar Barang">Antar Barang</option>
            <option value="Ambil Barang">Ambil Barang</option>
            <option value="Antar Dokumen dan Barang">Antar Dokumen dan Barang</option>
            <option value="Kunjungan">Kunjungan</option>
            <option value="Lain-lain">Lain-lain</option>
          </select>
          <label for="tujuan">Tujuan Kunjungan</label>
          <div class="error-message">Tujuan kunjungan harus dipilih</div>
        </div>
        <div class="form-group">
          <input type="text" id="deskripsi" placeholder="Deskripsi Singkat Kunjungan (cth: Bertemu Bpk. Andi)" required />
          <label for="deskripsi">Deskripsi Kunjungan</label>
          <div class="error-message">Deskripsi kunjungan harus diisi</div>
        </div>
        <button type="submit" id="submitBtn"><i class="fas fa-plus-circle"></i> Tambah ke Buku Tamu</button>
      </form>
    </div>

    <div class="camera-wrapper">
      <video id="video" autoplay></video>
      <div class="photo-status" id="photoStatus">
        <i class="fas fa-times-circle"></i> Belum ada foto yang diambil
      </div>
      <div class="camera-controls">
        <button type="button" onclick="takePhoto()" id="captureBtn">📸 Ambil Foto</button>
        <button type="button" onclick="retakePhoto()" id="retakeBtn" style="display: none;">🔄 Ambil Ulang</button>
      </div>
      <canvas id="canvas"></canvas>
      <img id="preview" alt="Preview Foto" />
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

  <script>
    // ==================== KONFIGURASI ====================
    const N8N_BASE_URL = 'https://n8n.genetek.co.id';
    const WEBHOOK_UPLOAD = '/webhook/upload-foto-tamu';

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC8LlcI_ccRGieFNjlVFLfEr2c4PBg6J70",
      authDomain: "logbook-e6ab3.firebaseapp.com",
      projectId: "logbook-e6ab3",
      storageBucket: "logbook-e6ab3.appspot.com",
      messagingSenderId: "484546392348",
      appId: "1:484546392348:web:861616b680427c158ecad9"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==================== CEK KONEKSI N8N ====================
    async function checkN8NConnection() {
        const statusElement = document.getElementById('connectionStatus');
        
        statusElement.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengecek koneksi ke server...';
        statusElement.className = 'connection-status';
        
        try {
            const formData = new FormData();
            const testBlob = new Blob(['test'], {type: 'text/plain'});
            formData.append('fileData', testBlob, 'test.txt');
            formData.append('fileName', 'test.txt');
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            const response = await fetch(`${N8N_BASE_URL}${WEBHOOK_UPLOAD}`, {
                method: 'POST',
                body: formData,
                mode: 'cors',
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (response.ok) {
                statusElement.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Server siap menerima upload foto';
                statusElement.className = 'connection-status connected';
                return true;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (error) {
            console.error('Connection test error:', error);
            statusElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Server tidak merespons. Pastikan workflow n8n sudah ACTIVE.';
            statusElement.className = 'connection-status disconnected';
            return false;
        }
    }

    // ==================== FUNGSI UPLOAD FOTO KE DROPBOX ====================
    function dataURLtoBlob(dataURL) {
      const arr = dataURL.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      return new Blob([u8arr], { type: mime });
    }

    async function uploadPhotoToDropbox(photoData, nama, tanggal) {
      try {
        const timestamp = new Date().getTime();
        const cleanNama = nama.replace(/[^a-zA-Z0-9]/g, '_');
        const formattedTanggal = tanggal.split(' ')[0];
        const fileName = `${formattedTanggal}_${cleanNama}_${timestamp}.jpg`;
        
        const blob = dataURLtoBlob(photoData);
        
        const formData = new FormData();
        formData.append('fileData', blob, fileName);
        formData.append('fileName', fileName);
        
        console.log('Uploading to:', `${N8N_BASE_URL}${WEBHOOK_UPLOAD}`);
        console.log('File name:', fileName);
        
        const response = await fetch(`${N8N_BASE_URL}${WEBHOOK_UPLOAD}`, {
          method: 'POST',
          body: formData,
          mode: 'cors'
        });
        
        console.log('Response status:', response.status);
        
        if (response.ok) {
          const result = await response.json();
          return { 
            success: true, 
            dropboxPath: `/ownclouddata/foto-tamu/${fileName}` 
          };
        } else {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
      } catch (error) {
        console.error('Upload ke Dropbox gagal:', error);
        return { success: false, dropboxPath: null, error: error.message };
      }
    }

    // ==================== BUKU TAMU FUNCTIONS ====================
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const preview = document.getElementById('preview');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const photoStatus = document.getElementById('photoStatus');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    
    let photoData = '';
    let stream = null;
    let isN8NReady = false;

    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.classList.add('show');
      }, 100);
      
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
          document.body.removeChild(notification);
        }, 400);
      }, 4000);
    }

    function updateDateTimeRealtime() {
      setInterval(() => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        const formattedTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        document.getElementById('tanggal').value = formattedTime;
      }, 1000);
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          width: { ideal: 1280 },
          height: { ideal: 720 }
        } 
      })
      .then(mediaStream => {
        stream = mediaStream;
        video.srcObject = stream;
        captureBtn.disabled = false;
      })
      .catch(err => {
        console.error('Akses kamera ditolak:', err);
        showNotification('Tidak dapat mengakses kamera. Pastikan Anda memberikan izin akses kamera.', 'error');
        captureBtn.disabled = true;
      });
    }

    function takePhoto() {
      if (!stream) {
        showNotification('Kamera belum siap. Silakan tunggu sebentar.', 'warning');
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      context.save();
      context.scale(-1, 1);
      context.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
      context.restore();

      photoData = canvas.toDataURL('image/jpeg', 0.4);
      preview.src = photoData;
      preview.style.display = 'block';
      
      photoStatus.innerHTML = '<i class="fas fa-check-circle"></i> Foto telah diambil';
      photoStatus.classList.add('has-photo');
      
      captureBtn.style.display = 'none';
      retakeBtn.style.display = 'block';
      
      showNotification('Foto berhasil diambil', 'success');
    }

    function retakePhoto() {
      photoData = '';
      preview.src = '';
      preview.style.display = 'none';
      
      photoStatus.innerHTML = '<i class="fas fa-times-circle"></i> Belum ada foto yang diambil';
      photoStatus.classList.remove('has-photo');
      
      captureBtn.style.display = 'block';
      retakeBtn.style.display = 'none';
    }

    function validateForm() {
      let isValid = true;
      const formGroups = document.querySelectorAll('#logForm .form-group');
      
      formGroups.forEach(group => {
        const input = group.querySelector('input, select, textarea');
        const errorMessage = group.querySelector('.error-message');
        
        group.classList.remove('error');
        
        if (input && input.value.trim() === '') {
          group.classList.add('error');
          isValid = false;
          return;
        }
        
        if (input && input.id === 'telepon' && input.value.trim() !== '') {
          const phoneRegex = /^(\+62|62|0)8[1-9][0-9]{6,9}$/;
          if (!phoneRegex.test(input.value.trim())) {
            group.classList.add('error');
            if (errorMessage) errorMessage.textContent = 'Format nomor telepon tidak valid. Contoh: 081234567890';
            isValid = false;
          }
        }
      });
      
      if (!photoData) {
        showNotification('Silakan ambil foto terlebih dahulu', 'warning');
        isValid = false;
      }
      
      return isValid;
    }

    // Event listeners untuk Buku Tamu
    document.addEventListener('DOMContentLoaded', async () => {
      updateDateTimeRealtime();
      startCamera();
      
      // Cek koneksi n8n
      isN8NReady = await checkN8NConnection();
      
      const inputs = document.querySelectorAll('#logForm input, #logForm select, #logForm textarea');
      inputs.forEach(input => {
        const formGroup = input.closest('.form-group');
        
        input.addEventListener('focus', () => {
          formGroup.classList.add('focused');
        });
        
        input.addEventListener('blur', () => {
          if (input.value.trim() === '') {
            formGroup.classList.remove('focused');
          }
        });
        
        if (input.id === 'telepon') {
          input.addEventListener('input', () => {
            const formGroup = input.closest('.form-group');
            const errorMessage = formGroup.querySelector('.error-message');
            
            if (input.value.trim() !== '') {
              const phoneRegex = /^(\+62|62|0)8[1-9][0-9]{6,9}$/;
              if (!phoneRegex.test(input.value.trim())) {
                formGroup.classList.add('error');
                if (errorMessage) errorMessage.textContent = 'Format nomor telepon tidak valid. Contoh: 081234567890';
              } else {
                formGroup.classList.remove('error');
              }
            } else {
              formGroup.classList.remove('error');
            }
          });
        }
      });
    });

    // Handler submit form - FOTO LANGSUNG KE DROPBOX
    document.getElementById('logForm').onsubmit = async function(e) {
      e.preventDefault();
      
      if (!validateForm()) {
        showNotification('Harap periksa kembali data yang Anda masukkan', 'error');
        return;
      }
      
      // Cek koneksi n8n lagi sebelum upload
      if (!isN8NReady) {
        isN8NReady = await checkN8NConnection();
        if (!isN8NReady) {
          showNotification('Server tidak tersedia. Foto tidak bisa disimpan ke Dropbox. Silakan coba lagi nanti.', 'error');
          return;
        }
      }
      
      loading.classList.add('show');
      submitBtn.disabled = true;
      
      const tanggal = document.getElementById('tanggal').value;
      const nama = document.getElementById('nama').value;
      const perusahaan = document.getElementById('perusahaan').value;
      const alamat = document.getElementById('alamat').value;
      const telepon = document.getElementById('telepon').value;
      const tujuan = document.getElementById('tujuan').value;
      const deskripsi = document.getElementById('deskripsi').value;

      // ========== UPLOAD FOTO KE DROPBOX ==========
      let dropboxPath = null;
      let dropboxUploadSuccess = false;
      
      try {
        showNotification('Mengupload foto ke Dropbox...', 'info');
        const dropboxResult = await uploadPhotoToDropbox(photoData, nama, tanggal);
        
        if (dropboxResult.success) {
          dropboxUploadSuccess = true;
          dropboxPath = dropboxResult.dropboxPath;
          showNotification('✅ Foto berhasil tersimpan di Dropbox!', 'success');
        } else {
          throw new Error(dropboxResult.error || 'Upload gagal');
        }
      } catch (error) {
        console.error('Error upload ke Dropbox:', error);
        showNotification('❌ Gagal upload foto ke Dropbox: ' + error.message, 'error');
        loading.classList.remove('show');
        submitBtn.disabled = false;
        return;
      }

      // Data yang disimpan ke Firestore (TANPA foto Base64)
      const dataToFirestore = {
        tanggal,
        nama,
        perusahaan,
        alamat,
        telepon,
        tujuan,
        deskripsi,
        dropboxPath: dropboxPath,
        uploadedToDropbox: dropboxUploadSuccess,
        uploadTimestamp: new Date().toISOString()
      };

      try {
        await db.collection("logbook").add(dataToFirestore);
        showNotification("✅ Data berhasil disimpan! Foto tersimpan di Dropbox.", 'success');
        
        // Reset formulir dan tampilan
        document.getElementById('logForm').reset();
        retakePhoto();
        
        const formGroups = document.querySelectorAll('#logForm .form-group');
        formGroups.forEach(group => {
          group.classList.remove('focused');
        });
        
      } catch (err) {
        console.error("Gagal menyimpan data ke Firebase:", err);
        showNotification("Data berhasil diupload ke Dropbox, tetapi gagal menyimpan ke database: " + err.message, 'warning');
      } finally {
        loading.classList.remove('show');
        submitBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
