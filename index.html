<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Buku Tamu - Genetek</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 40px;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
    }

    .form-wrapper, .camera-wrapper {
      flex: 1;
    }

    .camera-wrapper {
      text-align: center;
      padding-left: 30px;
      border-left: 1px solid rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #4f46e5;
      margin-bottom: 30px;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    h2 i {
      color: #7c3aed;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    input.readonly {
      background: #f3f4f6;
      cursor: default;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      margin-top: 10px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .camera-controls {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }

    .camera-controls button {
      flex: 1;
      margin-top: 0;
    }

    video {
      width: 100%;
      border-radius: 20px;
      background: #1f2937;
      margin-bottom: 15px;
      transform: scaleX(-1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    #preview {
      width: 100%;
      border-radius: 20px;
      display: none;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    canvas {
      display: none;
    }

    .photo-status {
      margin: 12px 0;
      padding: 10px;
      border-radius: 14px;
      font-size: 14px;
      background: #f3f4f6;
      color: #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .photo-status.has-photo {
      background: #d1fae5;
      color: #065f46;
    }

    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .form-group.error input,
    .form-group.error select {
      border-color: #dc2626;
    }

    .form-group.error .error-message {
      display: block;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 14px 20px;
      border-radius: 14px;
      color: white;
      font-weight: 500;
      transform: translateX(150%);
      transition: transform 0.3s ease;
      z-index: 1000;
      max-width: 350px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .notification.show {
      transform: translateX(0);
    }

    .notification.success {
      background: #10b981;
    }

    .notification.error {
      background: #ef4444;
    }

    .notification.warning {
      background: #f59e0b;
    }

    .notification.info {
      background: #3b82f6;
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 15px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      color: white;
      font-size: 14px;
      font-weight: 500;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        padding: 25px;
        gap: 25px;
      }
      .camera-wrapper {
        padding-left: 0;
        border-left: none;
        padding-top: 20px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
      }
      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- FORM SECTION -->
  <div class="form-wrapper">
    <h2><i class="fas fa-book-open"></i> Buku Tamu Genetek</h2>
    <form id="logForm">
      <div class="form-group">
        <input type="text" id="tanggal" class="readonly" readonly required />
        <div class="error-message">Tanggal harus diisi</div>
      </div>
      <div class="form-group">
        <input type="text" id="nama" placeholder="Nama Lengkap" required />
        <div class="error-message">Nama lengkap harus diisi</div>
      </div>
      <div class="form-group">
        <input type="text" id="perusahaan" placeholder="Nama Perusahaan / Instansi" required />
        <div class="error-message">Nama perusahaan harus diisi</div>
      </div>
      <div class="form-group">
        <input type="text" id="alamat" placeholder="Alamat Perusahaan" required />
        <div class="error-message">Alamat harus diisi</div>
      </div>
      <div class="form-group">
        <input type="tel" id="telepon" placeholder="Nomor Telepon (contoh: 081234567890)" required />
        <div class="error-message">Format nomor telepon tidak valid</div>
      </div>
      <div class="form-group">
        <select id="tujuan" required>
          <option value="" disabled selected>Pilih Tujuan Kunjungan</option>
          <option value="Antar Dokumen">📄 Antar Dokumen</option>
          <option value="Ambil Dokumen">📄 Ambil Dokumen</option>
          <option value="Antar Barang">📦 Antar Barang</option>
          <option value="Ambil Barang">📦 Ambil Barang</option>
          <option value="Konsultasi">💬 Konsultasi</option>
          <option value="Rapat">🤝 Rapat</option>
          <option value="Lain-lain">📌 Lain-lain</option>
        </select>
        <div class="error-message">Tujuan harus dipilih</div>
      </div>
      <div class="form-group">
        <input type="text" id="deskripsi" placeholder="Deskripsi Kunjungan (contoh: Bertemu dengan Bpk. Andi)" required />
        <div class="error-message">Deskripsi harus diisi</div>
      </div>
      <button type="submit" id="submitBtn">
        <i class="fas fa-save"></i> Simpan ke Buku Tamu
      </button>
    </form>
  </div>

  <!-- CAMERA SECTION -->
  <div class="camera-wrapper">
    <h2><i class="fas fa-camera"></i> Foto Tamu</h2>
    <video id="video" autoplay playsinline></video>
    <div class="photo-status" id="photoStatus">
      <i class="fas fa-times-circle"></i> Belum ada foto
    </div>
    <div class="camera-controls">
      <button type="button" onclick="takePhoto()" id="captureBtn">
        <i class="fas fa-camera"></i> Ambil Foto
      </button>
      <button type="button" onclick="retakePhoto()" id="retakeBtn" style="display:none;">
        <i class="fas fa-redo-alt"></i> Ambil Ulang
      </button>
    </div>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="Preview Foto" />
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Mengupload foto ke Dropbox...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
  // ==================== KONFIGURASI ====================
  const N8N_WEBHOOK_URL = 'https://n8n.genetek.co.id/webhook/upload-foto';

  // Konfigurasi Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyC8LlcI_ccRGieFNjlVFLfEr2c4PBg6J70",
    authDomain: "logbook-e6ab3.firebaseapp.com",
    projectId: "logbook-e6ab3",
    storageBucket: "logbook-e6ab3.appspot.com",
    messagingSenderId: "484546392348",
    appId: "1:484546392348:web:861616b680427c158ecad9"
  };

  // Inisialisasi Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ==================== DOM ELEMENTS ====================
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const preview = document.getElementById('preview');
  const captureBtn = document.getElementById('captureBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const photoStatus = document.getElementById('photoStatus');
  const submitBtn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');

  let photoBlob = null;
  let stream = null;

  // ==================== NOTIFIKASI ====================
  function showNotification(message, type = 'success') {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
    document.body.appendChild(notification);
    setTimeout(() => notification.classList.add('show'), 100);
    setTimeout(() => {
      notification.classList.remove('show');
      setTimeout(() => notification.remove(), 400);
    }, 4000);
  }

  // ==================== UPDATE TANGGAL ====================
  function updateDateTime() {
    const now = new Date();
    const tahun = now.getFullYear();
    const bulan = String(now.getMonth() + 1).padStart(2, '0');
    const tgl = String(now.getDate()).padStart(2, '0');
    const jam = String(now.getHours()).padStart(2, '0');
    const menit = String(now.getMinutes()).padStart(2, '0');
    const detik = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('tanggal').value = `${tahun}-${bulan}-${tgl} ${jam}:${menit}:${detik}`;
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);

  // ==================== KAMERA ====================
  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } } })
      .then(mediaStream => {
        stream = mediaStream;
        video.srcObject = stream;
        captureBtn.disabled = false;
        console.log('✅ Kamera siap');
      })
      .catch(err => {
        console.error('Kamera error:', err);
        showNotification('Tidak dapat mengakses kamera. Pastikan izin diberikan.', 'error');
        captureBtn.disabled = true;
      });
  }

  function takePhoto() {
    if (!stream) {
      showNotification('Kamera belum siap, tunggu sebentar', 'warning');
      return;
    }

    // Set canvas ukuran sesuai video
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // Gambar video ke canvas (dengan flip horizontal untuk mirror)
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();

    // Konversi ke JPEG dengan kualitas tinggi
    canvas.toBlob(blob => {
      photoBlob = blob;
      const url = URL.createObjectURL(blob);
      preview.src = url;
      preview.style.display = 'block';
      photoStatus.innerHTML = `<i class="fas fa-check-circle"></i> Foto berhasil diambil (${Math.round(blob.size / 1024)} KB)`;
      photoStatus.classList.add('has-photo');
      captureBtn.style.display = 'none';
      retakeBtn.style.display = 'block';
      console.log('📸 Foto diambil, ukuran:', blob.size, 'bytes');
      showNotification(`Foto berhasil diambil (${Math.round(blob.size / 1024)} KB)`, 'success');
    }, 'image/jpeg', 0.9); // Kualitas 90% untuk hasil lebih baik
  }

  function retakePhoto() {
    photoBlob = null;
    preview.src = '';
    preview.style.display = 'none';
    photoStatus.innerHTML = '<i class="fas fa-times-circle"></i> Belum ada foto';
    photoStatus.classList.remove('has-photo');
    captureBtn.style.display = 'block';
    retakeBtn.style.display = 'none';
  }

  // ==================== VALIDASI FORM ====================
  function validateForm() {
    let isValid = true;

    // Validasi field wajib
    const requiredFields = ['nama', 'perusahaan', 'alamat', 'telepon', 'tujuan', 'deskripsi'];
    requiredFields.forEach(field => {
      const input = document.getElementById(field);
      const group = input.closest('.form-group');
      if (!input.value.trim()) {
        group.classList.add('error');
        isValid = false;
      } else {
        group.classList.remove('error');
      }
    });

    // Validasi nomor telepon
    const telepon = document.getElementById('telepon');
    const phoneRegex = /^(\+62|62|0)8[1-9][0-9]{6,9}$/;
    if (telepon.value.trim() && !phoneRegex.test(telepon.value.trim())) {
      telepon.closest('.form-group').classList.add('error');
      isValid = false;
    }

    // Validasi foto
    if (!photoBlob) {
      showNotification('Silakan ambil foto terlebih dahulu', 'warning');
      isValid = false;
    } else if (photoBlob.size < 5000) {
      showNotification('Ukuran foto terlalu kecil, coba ambil foto ulang', 'warning');
      isValid = false;
    }

    return isValid;
  }

  // ==================== UPLOAD FOTO KE DROPBOX via N8N ====================
  async function uploadPhotoToDropbox(blob, nama, tanggal) {
    const timestamp = Date.now();
    const cleanNama = nama.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 50);
    const formattedDate = tanggal.split(' ')[0];
    const fileName = `${formattedDate}_${cleanNama}_${timestamp}.jpg`;

    console.log('📤 Uploading file:', fileName);
    console.log('📦 File size:', blob.size, 'bytes');

    // Kirim sebagai base64 untuk menghindari masalah FormData
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = async function() {
        const base64Data = reader.result.split(',')[1];
        
        const payload = {
          fileName: fileName,
          fileData: base64Data,
          fileSize: blob.size,
          mimeType: 'image/jpeg'
        };

        try {
          const response = await fetch(N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
          });

          const responseText = await response.text();
          console.log('📥 Response status:', response.status);
          console.log('📥 Response body:', responseText);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${responseText}`);
          }

          let result;
          try {
            result = JSON.parse(responseText);
          } catch(e) {
            result = { success: true, message: responseText };
          }

          resolve({
            success: true,
            fileName: fileName,
            response: result
          });
        } catch (error) {
          reject(error);
        }
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  // ==================== SUBMIT FORM ====================
  document.getElementById('logForm').onsubmit = async function(e) {
    e.preventDefault();

    if (!validateForm()) {
      showNotification('Harap periksa kembali data yang dimasukkan', 'error');
      return;
    }

    // Ambil data form
    const tanggal = document.getElementById('tanggal').value;
    const nama = document.getElementById('nama').value.trim();
    const perusahaan = document.getElementById('perusahaan').value.trim();
    const alamat = document.getElementById('alamat').value.trim();
    const telepon = document.getElementById('telepon').value.trim();
    const tujuan = document.getElementById('tujuan').value;
    const deskripsi = document.getElementById('deskripsi').value.trim();

    loading.classList.add('show');
    submitBtn.disabled = true;

    try {
      // STEP 1: Upload foto ke Dropbox via n8n
      showNotification('📤 Mengupload foto ke Dropbox...', 'info');
      const uploadResult = await uploadPhotoToDropbox(photoBlob, nama, tanggal);
      showNotification('✅ Foto berhasil tersimpan di Dropbox!', 'success');

      // STEP 2: Simpan data ke Firebase
      const dataToFirestore = {
        tanggal,
        nama,
        perusahaan,
        alamat,
        telepon,
        tujuan,
        deskripsi,
        fileName: uploadResult.fileName,
        uploadedToDropbox: true,
        uploadTimestamp: new Date().toISOString(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      await db.collection('logbook').add(dataToFirestore);
      showNotification('✅ Data berhasil disimpan!', 'success');

      // Reset form
      document.getElementById('logForm').reset();
      retakePhoto();
      updateDateTime();

      // Hapus error style
      document.querySelectorAll('.form-group').forEach(group => {
        group.classList.remove('error');
      });

    } catch (error) {
      console.error('Error:', error);
      showNotification('❌ Gagal: ' + error.message, 'error');
    } finally {
      loading.classList.remove('show');
      submitBtn.disabled = false;
    }
  };

  // ==================== INIT ====================
  startCamera();

  // Event listener untuk validasi realtime telepon
  document.getElementById('telepon').addEventListener('input', function() {
    const phoneRegex = /^(\+62|62|0)8[1-9][0-9]{6,9}$/;
    const group = this.closest('.form-group');
    if (this.value.trim() !== '' && !phoneRegex.test(this.value.trim())) {
      group.classList.add('error');
    } else {
      group.classList.remove('error');
    }
  });
</script>
</body>
</html>
