<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Buku Tamu - Genetek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4a6cf7;
      --secondary-color: #6a5acd;
      --accent-color: #7FFFD4;
      --text-color: #333;
      --light-text-color: #666;
      --border-color: rgba(0,0,0,0.1);
      --bg-light: rgba(255,255,255,0.95);
      --shadow-light: 0 8px 32px rgba(31, 38, 135, 0.15);
      --shadow-hover: 0 12px 40px rgba(31, 38, 135, 0.25);
      --success-color: #28a745;
      --error-color: #dc3545;
      --warning-color: #ffc107;
      --info-color: #17a2b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--accent-color) 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-color);
    }

    .container {
      display: flex;
      flex-direction: row;
      gap: 40px;
      background: var(--bg-light);
      padding: 40px;
      border-radius: 20px;
      box-shadow: var(--shadow-light);
      max-width: 1100px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
    }

    .form-wrapper, .camera-wrapper {
      flex: 1;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .camera-wrapper {
      text-align: center;
      padding-left: 20px;
      border-left: 1px solid var(--border-color);
    }

    img.logo {
      display: block;
      margin: 0 auto 25px;
      max-width: 200px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .form-group {
      position: relative;
      margin-bottom: 20px;
    }

    input, textarea, select {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background-color: rgba(255,255,255,0.7);
      transition: all 0.3s ease;
      color: var(--text-color);
      font-family: 'Poppins', sans-serif;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.2);
      background-color: white;
    }

    select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 15px center;
    }

    .form-group label {
      position: absolute;
      top: -10px;
      left: 15px;
      background: var(--bg-light);
      padding: 0 5px;
      font-size: 12px;
      color: var(--primary-color);
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .form-group.focused label { opacity: 1; }

    .error-message {
      color: var(--error-color);
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .form-group.error input,
    .form-group.error select { border-color: var(--error-color); }
    .form-group.error .error-message { display: block; }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
    }

    .camera-controls { display: flex; gap: 10px; margin-top: 15px; }
    .camera-controls button { flex: 1; }

    video {
      width: 100%;
      border-radius: 12px;
      margin: 15px auto;
      display: block;
      transform: scaleX(-1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      background: #f0f0f0;
    }

    #preview {
      width: 100%;
      border-radius: 12px;
      margin: 15px auto;
      display: none;
      object-fit: cover;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    canvas { display: none; }

    .photo-status {
      margin: 10px 0;
      font-size: 14px;
      color: var(--light-text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .photo-status.has-photo { color: var(--success-color); }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      color: white;
      font-weight: 500;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transform: translateX(150%);
      transition: transform 0.4s ease;
      z-index: 1000;
      max-width: 350px;
    }

    .notification.show { transform: translateX(0); }
    .notification.success { background-color: var(--success-color); }
    .notification.error { background-color: var(--error-color); }
    .notification.warning { background-color: var(--warning-color); color: #333; }
    .notification.info { background-color: var(--info-color); }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .loading.show { display: flex; }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .connection-status {
      text-align: center;
      padding: 8px;
      margin-bottom: 15px;
      border-radius: 8px;
      font-size: 12px;
      background: #f8f9fa;
      color: #666;
    }

    .connection-status.connected { background: #d4edda; color: #155724; }
    .connection-status.disconnected { background: #f8d7da; color: #721c24; }
    .connection-status.checking { background: #fff3cd; color: #856404; }

    @media (max-width: 992px) {
      .container { flex-direction: column; gap: 30px; padding: 30px; max-width: 600px; }
      .camera-wrapper { border-left: none; padding-left: 0; padding-top: 30px; border-top: 1px solid var(--border-color); }
    }

    @media (max-width: 576px) {
      .container { padding: 25px; }
      h2 { font-size: 22px; }
      input, select, button { padding: 10px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <img src="genetek-logo.png" alt="Genetek Logo" class="logo" onerror="this.src='https://via.placeholder.com/200x80?text=Genetek'" />
      <h2><i class="fas fa-book"></i> Buku Tamu</h2>
      
      <div class="connection-status checking" id="connectionStatus">
        <i class="fas fa-spinner fa-pulse"></i> Mengecek koneksi ke server...
      </div>
      
      <form id="logForm">
        <div class="form-group">
          <input type="text" id="tanggal" required readonly style="pointer-events: none; background-color: rgba(245,245,245,0.7);" />
          <label for="tanggal">Tanggal & Waktu</label>
        </div>
        <div class="form-group">
          <input type="text" id="nama" placeholder="Nama Lengkap" required />
          <label for="nama">Nama Lengkap</label>
          <div class="error-message">Nama lengkap harus diisi</div>
        </div>
        <div class="form-group">
          <input type="text" id="perusahaan" placeholder="Nama Perusahaan" required />
          <label for="perusahaan">Nama Perusahaan</label>
          <div class="error-message">Nama perusahaan harus diisi</div>
        </div>
        <div class="form-group">
          <input type="text" id="alamat" placeholder="Alamat Perusahaan" required />
          <label for="alamat">Alamat Perusahaan</label>
          <div class="error-message">Alamat perusahaan harus diisi</div>
        </div>
        <div class="form-group">
          <input type="tel" id="telepon" placeholder="Nomor Telepon (cth: 081234567890)" required />
          <label for="telepon">Nomor Telepon</label>
          <div class="error-message">Format nomor telepon tidak valid. Contoh: 081234567890</div>
        </div>
        <div class="form-group">
          <select id="tujuan" required>
            <option value="" disabled selected>Pilih Tujuan Kunjungan</option>
            <option value="Antar Dokumen">Antar Dokumen</option>
            <option value="Ambil Dokumen">Ambil Dokumen</option>
            <option value="Antar Barang">Antar Barang</option>
            <option value="Ambil Barang">Ambil Barang</option>
            <option value="Antar Dokumen dan Barang">Antar Dokumen dan Barang</option>
            <option value="Kunjungan">Kunjungan</option>
            <option value="Lain-lain">Lain-lain</option>
          </select>
          <label for="tujuan">Tujuan Kunjungan</label>
          <div class="error-message">Tujuan kunjungan harus dipilih</div>
        </div>
        <div class="form-group">
          <input type="text" id="deskripsi" placeholder="Deskripsi Singkat Kunjungan" required />
          <label for="deskripsi">Deskripsi Kunjungan</label>
          <div class="error-message">Deskripsi kunjungan harus diisi</div>
        </div>
        <button type="submit" id="submitBtn"><i class="fas fa-plus-circle"></i> Tambah ke Buku Tamu</button>
      </form>
    </div>

    <div class="camera-wrapper">
      <video id="video" autoplay playsinline></video>
      <div class="photo-status" id="photoStatus">
        <i class="fas fa-times-circle"></i> Belum ada foto yang diambil
      </div>
      <div class="camera-controls">
        <button type="button" onclick="takePhoto()" id="captureBtn">📸 Ambil Foto</button>
        <button type="button" onclick="retakePhoto()" id="retakeBtn" style="display: none;">🔄 Ambil Ulang</button>
      </div>
      <canvas id="canvas"></canvas>
      <img id="preview" alt="Preview Foto" />
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

  <script>
    // ==================== KONFIGURASI ====================
    const N8N_BASE_URL = 'https://n8n.genetek.co.id';
    const WEBHOOK_UPLOAD = '/webhook/upload-foto-tamu';

    const firebaseConfig = {
      apiKey: "AIzaSyC8LlcI_ccRGieFNjlVFLfEr2c4PBg6J70",
      authDomain: "logbook-e6ab3.firebaseapp.com",
      projectId: "logbook-e6ab3",
      storageBucket: "logbook-e6ab3.appspot.com",
      messagingSenderId: "484546392348",
      appId: "1:484546392348:web:861616b680427c158ecad9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==================== DOM ELEMENTS ====================
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const preview = document.getElementById('preview');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const photoStatus = document.getElementById('photoStatus');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const connectionStatus = document.getElementById('connectionStatus');
    
    let photoData = '';
    let stream = null;
    let isN8NReady = false;

    // ==================== NOTIFICATION ====================
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      setTimeout(() => notification.classList.add('show'), 100);
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 400);
      }, 4000);
    }

    // ==================== CEK KONEKSI N8N ====================
    async function checkN8NConnection() {
        connectionStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengecek koneksi ke server...';
        connectionStatus.className = 'connection-status checking';
        
        try {
            // Test dengan OPTIONS request dulu
            const optionsResponse = await fetch(`${N8N_BASE_URL}${WEBHOOK_UPLOAD}`, {
                method: 'OPTIONS',
                mode: 'cors'
            });
            
            console.log('OPTIONS response:', optionsResponse.status);
            
            // Buat file test kecil
            const formData = new FormData();
            const testBlob = new Blob(['test'], {type: 'text/plain'});
            formData.append('fileData', testBlob, 'test.txt');
            formData.append('fileName', 'test.txt');
            
            const response = await fetch(`${N8N_BASE_URL}${WEBHOOK_UPLOAD}`, {
                method: 'POST',
                body: formData,
                mode: 'cors'
            });
            
            console.log('POST response status:', response.status);
            
            if (response.ok) {
                connectionStatus.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Server siap menerima upload foto';
                connectionStatus.className = 'connection-status connected';
                return true;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (error) {
            console.error('Connection error:', error);
            connectionStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Server tidak merespons. Pastikan workflow n8n sudah ACTIVE.';
            connectionStatus.className = 'connection-status disconnected';
            return false;
        }
    }

    // ==================== UPLOAD FOTO KE DROPBOX ====================
    function dataURLtoBlob(dataURL) {
      const arr = dataURL.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) u8arr[n] = bstr.charCodeAt(n);
      return new Blob([u8arr], { type: mime });
    }

    async function uploadPhotoToDropbox(photoData, nama, tanggal) {
      try {
        const timestamp = new Date().getTime();
        const cleanNama = nama.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 50);
        const formattedTanggal = tanggal.split(' ')[0];
        const fileName = `${formattedTanggal}_${cleanNama}_${timestamp}.jpg`;
        
        const blob = dataURLtoBlob(photoData);
        const formData = new FormData();
        formData.append('fileData', blob, fileName);
        formData.append('fileName', fileName);
        
        console.log('Uploading file:', fileName);
        console.log('To URL:', `${N8N_BASE_URL}${WEBHOOK_UPLOAD}`);
        
        const response = await fetch(`${N8N_BASE_URL}${WEBHOOK_UPLOAD}`, {
          method: 'POST',
          body: formData,
          mode: 'cors'
        });
        
        // Baca response sebagai TEXT (bukan JSON) untuk menghindari error parsing
        const responseText = await response.text();
        console.log('Response status:', response.status);
        console.log('Response text:', responseText);
        
        if (response.ok) {
          // Upload sukses meskipun response bukan JSON
          return { 
            success: true, 
            dropboxPath: `/ownclouddata/foto-tamu/${fileName}`,
            message: responseText || 'Upload successful'
          };
        } else {
          throw new Error(`HTTP ${response.status}: ${responseText}`);
        }
      } catch (error) {
        console.error('Upload error details:', error);
        return { success: false, dropboxPath: null, error: error.message };
      }
    }

    // ==================== KAMERA ====================
    function startCamera() {
      navigator.mediaDevices.getUserMedia({ 
        video: { width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      })
      .then(mediaStream => {
        stream = mediaStream;
        video.srcObject = stream;
        captureBtn.disabled = false;
        console.log('Camera started');
      })
      .catch(err => {
        console.error('Camera error:', err);
        showNotification('Tidak dapat mengakses kamera. Pastikan Anda memberikan izin.', 'error');
        captureBtn.disabled = true;
      });
    }

    function takePhoto() {
      if (!stream) {
        showNotification('Kamera belum siap. Silakan tunggu.', 'warning');
        return;
      }

      // Set canvas dimensions
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      // Draw video frame (mirror effect)
      context.save();
      context.scale(-1, 1);
      context.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
      context.restore();
      
      // Convert to JPEG with 40% quality
      photoData = canvas.toDataURL('image/jpeg', 0.4);
      
      // Show preview
      preview.src = photoData;
      preview.style.display = 'block';
      
      // Update UI
      photoStatus.innerHTML = '<i class="fas fa-check-circle"></i> Foto telah diambil';
      photoStatus.classList.add('has-photo');
      captureBtn.style.display = 'none';
      retakeBtn.style.display = 'block';
      
      showNotification('Foto berhasil diambil', 'success');
    }

    function retakePhoto() {
      photoData = '';
      preview.src = '';
      preview.style.display = 'none';
      photoStatus.innerHTML = '<i class="fas fa-times-circle"></i> Belum ada foto yang diambil';
      photoStatus.classList.remove('has-photo');
      captureBtn.style.display = 'block';
      retakeBtn.style.display = 'none';
    }

    // ==================== VALIDASI FORM ====================
    function updateDateTimeRealtime() {
      const update = () => {
        const now = new Date();
        const formattedTime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        document.getElementById('tanggal').value = formattedTime;
      };
      update();
      setInterval(update, 1000);
    }

    function validateForm() {
      let isValid = true;
      
      // Validate required fields
      const requiredFields = ['nama', 'perusahaan', 'alamat', 'telepon', 'tujuan', 'deskripsi'];
      requiredFields.forEach(field => {
        const input = document.getElementById(field);
        const group = input.closest('.form-group');
        if (!input.value.trim()) {
          group.classList.add('error');
          isValid = false;
        } else {
          group.classList.remove('error');
        }
      });
      
      // Validate phone number
      const telepon = document.getElementById('telepon');
      const phoneRegex = /^(\+62|62|0)8[1-9][0-9]{6,9}$/;
      if (telepon.value.trim() && !phoneRegex.test(telepon.value.trim())) {
        telepon.closest('.form-group').classList.add('error');
        isValid = false;
      }
      
      // Validate photo
      if (!photoData) {
        showNotification('Silakan ambil foto terlebih dahulu', 'warning');
        isValid = false;
      }
      
      return isValid;
    }

    // ==================== SUBMIT FORM ====================
    document.getElementById('logForm').onsubmit = async function(e) {
      e.preventDefault();
      
      if (!validateForm()) {
        showNotification('Harap periksa kembali data yang Anda masukkan', 'error');
        return;
      }
      
      // Check n8n connection
      if (!isN8NReady) {
        isN8NReady = await checkN8NConnection();
        if (!isN8NReady) {
          showNotification('Server tidak tersedia. Foto tidak bisa disimpan ke Dropbox.', 'error');
          return;
        }
      }
      
      // Get form data
      const tanggal = document.getElementById('tanggal').value;
      const nama = document.getElementById('nama').value;
      const perusahaan = document.getElementById('perusahaan').value;
      const alamat = document.getElementById('alamat').value;
      const telepon = document.getElementById('telepon').value;
      const tujuan = document.getElementById('tujuan').value;
      const deskripsi = document.getElementById('deskripsi').value;
      
      // Show loading
      loading.classList.add('show');
      submitBtn.disabled = true;
      
      try {
        // Upload photo to Dropbox
        showNotification('Mengupload foto ke Dropbox...', 'info');
        const uploadResult = await uploadPhotoToDropbox(photoData, nama, tanggal);
        
        if (!uploadResult.success) {
          throw new Error(uploadResult.error || 'Upload gagal');
        }
        
        showNotification('✅ Foto berhasil tersimpan di Dropbox!', 'success');
        
        // Save to Firebase (without photo base64)
        const dataToFirestore = {
          tanggal,
          nama,
          perusahaan,
          alamat,
          telepon,
          tujuan,
          deskripsi,
          dropboxPath: uploadResult.dropboxPath,
          uploadedToDropbox: true,
          uploadTimestamp: new Date().toISOString(),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        await db.collection("logbook").add(dataToFirestore);
        
        showNotification('✅ Data berhasil disimpan!', 'success');
        
        // Reset form
        document.getElementById('logForm').reset();
        retakePhoto();
        
        // Remove focus from all form groups
        document.querySelectorAll('.form-group').forEach(group => {
          group.classList.remove('focused');
        });
        
        // Reset tanggal field
        updateDateTimeRealtime();
        
      } catch (error) {
        console.error('Error:', error);
        showNotification('Gagal: ' + error.message, 'error');
      } finally {
        loading.classList.remove('show');
        submitBtn.disabled = false;
      }
    };

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', async () => {
      console.log('Page loaded, initializing...');
      
      updateDateTimeRealtime();
      startCamera();
      
      // Check n8n connection
      isN8NReady = await checkN8NConnection();
      
      // Setup form group focus effects
      document.querySelectorAll('#logForm input, #logForm select').forEach(input => {
        const group = input.closest('.form-group');
        input.addEventListener('focus', () => group.classList.add('focused'));
        input.addEventListener('blur', () => { 
          if (!input.value.trim()) group.classList.remove('focused'); 
        });
      });
      
      // Phone validation on input
      document.getElementById('telepon').addEventListener('input', function() {
        const group = this.closest('.form-group');
        const phoneRegex = /^(\+62|62|0)8[1-9][0-9]{6,9}$/;
        if (this.value.trim() !== '' && !phoneRegex.test(this.value.trim())) {
          group.classList.add('error');
        } else {
          group.classList.remove('error');
        }
      });
    });
  </script>
</body>
</html>
